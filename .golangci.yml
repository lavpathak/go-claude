# .golangci.yml — Team linting standards
# Run: golangci-lint run ./...

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Catch real bugs
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - typecheck

    # Enforce Go idioms
    - gofmt
    - goimports
    - gocritic
    - revive
    - unconvert
    - unparam

    # Safety
    - gosec
    - bodyclose
    - noctx

    # Testing
    - tparallel
    - tenv

  disable:
    # Too noisy for a learning team
    - wsl
    - funlen
    - gocognit
    - cyclop
    - varnamelen

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
      - rangeValCopy

  revive:
    rules:
      - name: exported
        severity: warning
      - name: blank-imports
        severity: error
      - name: error-return
        severity: error
      - name: error-naming
        severity: warning
      - name: var-naming
        severity: warning
      - name: package-comments
        severity: warning

issues:
  max-issues-per-linter: 10
  max-same-issues: 3

  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - gosec
        - unparam
